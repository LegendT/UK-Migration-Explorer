[build]
  command = "npm test && npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "22"

# The data contract runs before the site is built, so a figure missing its source or a
# claim citing a metric that no longer exists fails the deploy rather than reaching a reader.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
