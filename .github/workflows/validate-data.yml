name: Validate data contract

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check every figure carries its source metadata
        run: node scripts/validate-data.mjs --verbose
      - name: Check claims resolve to live figures and stay balanced
        run: node scripts/validate-claims.mjs
